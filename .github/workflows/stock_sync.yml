name: Stock Data Sync

on:
  schedule:
    # 這裡設定執行頻率。設定為每 5 分鐘執行一次 (UTC 時間)
    # 這是在 GitHub 免費額度與數據即時性之間的最安全平衡點
    - cron: '*/5 * * * *'
  workflow_dispatch: # 允許手動從 GitHub 介面觸發

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy supabase python-dotenv pytz

      - name: Run Sync Script
        env:
          # 左邊是腳本讀取的變數名，右邊是 GitHub Secrets 的名稱
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/sync_stocks.py

name: Stock Data Sync

on:
  schedule:
    # 設定說明：
    # */15 : 每 15 分鐘執行一次
    # 1-8  : UTC 時間 01:00 到 08:59 (約台灣時間 09:00 - 15:59，涵蓋台股與港陸股開盤)
    # * : 每月
    # * : 每天
    # MON-FRI : 週一至週五執行
    - cron: '*/15 1-8 * * MON-FRI'
    
  workflow_dispatch: # 保持手動觸發功能，讓你點擊前端按鈕時依然有效

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy supabase python-dotenv pytz

      - name: Run Sync Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/sync_stocks.py